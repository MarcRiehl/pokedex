<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./style/standard.css">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/dialog.css">
    <link rel="stylesheet" href="./style/mobil.css">
    <link rel="stylesheet" href="./style/all.min.css" />
    <script src="./scripts/script.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Pokedex" />
    <link rel="manifest" href="./favicon/site.webmanifest" />

</head>
<body onload="init()">
    <section class="wrapper-header">
        <header class="top-menu">
            <div class="top-logo">
                <a href="index.html">
                    <img class="top-logo-img" src="./assets/img/logo-pokedex.png" alt="Logo Pokedex" /></a>
                <div class="headline-header">Pokedex</div>
            </div>
            <div class="top-menu-right">
                <input id="search-pokemon" type="text" placeholder="search Pokemon">
                <button class="search-button" onclick="searchPokemon()"><img class="magnifying-glas"
                        src="./assets/img/magnifying-glass.png" alt="Magnifying Glas" /></a></button>
            </div>
        </header>
    </section>
    <main>
        <div id="overlay" class="hidden"><img src="./assets/img/loading-pokeball.png" alt="Pokeball" />
        </div>
        <dialog id="dialog-frame" aria-labelledby="dialog-title" closedby="any" class="">
        </dialog>
        <section class="wrapper-content">
            <section class="wrapper-inner">
                <!-- #region Content -->

                <section id="content">
                </section>
                <div id="load-more">
                    <button class="load-more-button" onclick="morePokemonData()">Load more...</button>
                </div>
                <div id="loaded-all">
                    <button class="load-more-button" onclick="renderThumb();scrollToBottom()">Back to all Loaded
                        Pokemons</button>
                </div>
                <!-- #endregion -->
            </section>

        </section>
    </main>
    <section class="wrapper-footer">
        <footer>
            <div class="footer-flex">
                <div class="footer-left">
                    <img class="logo-footer-img" src="./assets/img/footer-logo-pokedex.png" alt="Logo Pokedex" />
                    <div class="copyright">&#169;&nbsp<span id="year"></span>. Alle Rechte vorbehalten.</div>
                </div>
                <div class="footer-right">
                    <div><a href="./sites/impressum.html" target="_self" class="footer-link">Impressum</a></div>
                    <div class="footer-line"></div>
                    <div><a href="./sites/datenschutz.html" target="_self" class="footer-link">Datenschutz</a></div>
                </div>
            </div>
        </footer>
    </section>

</body>

</html>
